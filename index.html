<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- makes mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Task</title>

    <!-- connecting CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Card -->
    <div class="container">

        <!-- App title -->
        <h1>Daily Task</h1>

        <!-- input area (textbox + button) -->
        <div class="inputArea">

            <!-- user will type task here -->
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Enter task">

            <!-- Add button -->
            <button id="addBtn">Add</button>
        </div>

        <!-- list where tasks will appear -->
        <ul id="taskList"></ul>

    </div>

    <!-- connecting JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
