<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo App</title>

<!-- connect CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Main card -->
<div class="container">

<h1>Daily Task</h1>

<!-- task counter -->
<p id="taskCounter">Total: 0 | Completed: 0</p>

<!-- FILTER BUTTONS -->
<div class="filters">
<button class="filterBtn" onclick="filterTasks('all', event)">All</button>
<button class="filterBtn" onclick="filterTasks('completed', event)">Completed</button>
<button class="filterBtn" onclick="filterTasks('pending', event)">Pending</button>
</div>

<!-- input area -->
<div class="inputArea">

<!-- task input -->
<input
type="text"
id="taskInput"
placeholder="Enter task"
autofocus>

<!-- add button -->
<button id="addBtn">Add</button>

</div>

<!-- task list -->
<ul id="taskList"></ul>

</div>

<!-- connect JS -->
<script src="script.js"></script>

</body>
</html>
